name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ElBruno.QRCodeGenerator.slnx -p:TargetFrameworks=net8.0

      - name: Build
        run: dotnet build ElBruno.QRCodeGenerator.slnx --no-restore -p:TargetFrameworks=net8.0

      - name: Test
        run: dotnet test ElBruno.QRCodeGenerator.slnx --no-build --framework net8.0
