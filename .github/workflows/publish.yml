name: Publish to NuGet

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ElBruno.QRCodeGenerator.slnx -p:TargetFrameworks=net8.0

      - name: Build
        run: dotnet build ElBruno.QRCodeGenerator.slnx -c Release --no-restore -p:TargetFrameworks=net8.0

      - name: Test
        run: dotnet test ElBruno.QRCodeGenerator.slnx -c Release --no-build --framework net8.0

      - name: Pack
        run: dotnet pack src/ElBruno.QRCodeGenerator.CLI/ElBruno.QRCodeGenerator.CLI.csproj -c Release --no-build -p:TargetFrameworks=net8.0 --output ./nupkgs

      - name: Push to NuGet
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "./nupkgs/*.snupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
